<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Tower e-Commerce · KPI Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: #2a2f40;
    --accent: #e8c547;
    --accent2: #5b8cf7;
    --accent3: #f76b5b;
    --accent4: #5bf7c0;
    --text: #e8eaf0;
    --muted: #6b7194;
    --danger: #f76b5b;
    --ok: #5bf7c0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* noise overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    padding: 3rem 4rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 2rem;
  }

  .header-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 400;
    line-height: 1.1;
    color: var(--text);
  }

  header h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .header-meta {
    text-align: right;
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    line-height: 1.8;
  }

  main {
    position: relative;
    z-index: 1;
    padding: 3rem 4rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* Section titles */
  .section-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* KPI Grid */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 3rem;
  }

  .kpi-card {
    background: var(--surface);
    padding: 1.5rem;
    transition: background 0.2s;
    position: relative;
    overflow: hidden;
  }
  .kpi-card:hover { background: var(--surface2); }

  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .kpi-card:hover::before { opacity: 1; }

  .kpi-card.highlight::before { opacity: 1; height: 3px; background: var(--accent); }
  .kpi-card.highlight { background: #1a1c10; }

  .kpi-label {
    font-size: 0.65rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.75rem;
  }

  .kpi-value {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    line-height: 1;
    color: var(--text);
  }

  .kpi-value.red { color: var(--danger); }
  .kpi-value.green { color: var(--ok); }
  .kpi-value.yellow { color: var(--accent); }

  .kpi-sub {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.4rem;
  }

  /* Charts grid */
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    margin-bottom: 3rem;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 2rem;
  }

  .chart-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    margin-bottom: 0.4rem;
    color: var(--text);
  }

  .chart-sub {
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 1.5rem;
    font-family: 'DM Mono', monospace;
  }

  .chart-wrap {
    position: relative;
    height: 240px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .donut-center {
    position: absolute;
    text-align: center;
    pointer-events: none;
  }
  .donut-center-val {
    font-family: 'DM Serif Display', serif;
    font-size: 1.8rem;
    color: var(--text);
    line-height: 1;
  }
  .donut-center-lbl {
    font-size: 0.6rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* Pareto */
  .pareto-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 2rem;
    margin-bottom: 3rem;
  }

  .pareto-row {
    display: grid;
    grid-template-columns: 130px 1fr 60px 70px;
    align-items: center;
    gap: 1rem;
    padding: 0.75rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.82rem;
  }
  .pareto-row:last-child { border-bottom: none; }
  .pareto-row.header {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding-bottom: 1rem;
  }

  .pareto-bar-track {
    background: var(--surface2);
    height: 6px;
    border-radius: 3px;
    position: relative;
    overflow: hidden;
  }
  .pareto-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: var(--accent);
    transition: width 1s ease;
  }
  .pareto-bar-fill.top2 { background: var(--danger); }

  .pareto-pct {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--text);
    text-align: right;
  }
  .pareto-acum {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
    text-align: right;
  }

  .conclusion-box {
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    border-left: 3px solid var(--accent);
    background: #1a1c10;
    font-size: 0.82rem;
    line-height: 1.6;
    color: var(--text);
  }
  .conclusion-box strong { color: var(--accent); }

  /* Seg tables */
  .seg-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    margin-bottom: 3rem;
  }

  .seg-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 2rem;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
  }

  thead tr {
    border-bottom: 1px solid var(--border);
  }

  th {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 0 0.5rem 0.75rem;
    text-align: right;
    font-weight: 400;
  }
  th:first-child { text-align: left; }

  td {
    padding: 0.65rem 0.5rem;
    text-align: right;
    border-bottom: 1px solid #1e2230;
    font-family: 'DM Mono', monospace;
  }
  td:first-child {
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    color: var(--text);
  }

  .pct-ok   { color: var(--ok); }
  .pct-warn { color: var(--accent); }
  .pct-bad  { color: var(--danger); }

  /* Acciones */
  .acciones-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    margin-bottom: 3rem;
  }

  .accion-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 3px solid var(--accent2);
    padding: 2rem;
  }
  .accion-card:nth-child(2) { border-top-color: var(--accent4); }

  .accion-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .accion-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1rem;
    margin-bottom: 1.25rem;
    line-height: 1.4;
    color: var(--text);
  }

  .accion-row {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 0.6rem;
    font-size: 0.78rem;
    align-items: flex-start;
  }
  .accion-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    min-width: 80px;
    padding-top: 0.1rem;
  }
  .accion-card:nth-child(2) .accion-tag { color: var(--accent4); }
  .accion-val {
    color: var(--muted);
    line-height: 1.5;
  }

  .meta-badge {
    display: inline-block;
    padding: 0.2rem 0.6rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    font-weight: 500;
    border-radius: 2px;
    background: #1e2230;
    color: var(--ok);
    border: 1px solid var(--ok);
    margin-top: 0.25rem;
  }

  /* North star box */
  .northstar {
    background: linear-gradient(135deg, #1a1c10 0%, #131620 100%);
    border: 1px solid var(--accent);
    padding: 2.5rem;
    margin-bottom: 3rem;
    display: flex;
    align-items: center;
    gap: 3rem;
  }

  .northstar-icon {
    font-size: 3rem;
    line-height: 1;
    flex-shrink: 0;
  }

  .northstar-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-bottom: 0.5rem;
  }

  .northstar-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    color: var(--text);
    margin-bottom: 0.75rem;
  }

  .northstar-text {
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.7;
    max-width: 600px;
  }

  footer {
    border-top: 1px solid var(--border);
    padding: 1.5rem 4rem;
    display: flex;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
  }

  @media (max-width: 900px) {
    header, main, footer { padding-left: 1.5rem; padding-right: 1.5rem; }
    .charts-grid, .seg-grid, .acciones-grid { grid-template-columns: 1fr; }
    .northstar { flex-direction: column; gap: 1rem; }
  }

  /* Fade in */
  .fade-in {
    opacity: 0;
    transform: translateY(16px);
    animation: fadeIn 0.5s forwards;
  }
  @keyframes fadeIn {
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<header class="fade-in">
  <div>
    <div class="header-tag">Máster en Economía, Finanzas y Computación · Inteligencia de Negocios II</div>
    <h1>Control Tower <em>e-Commerce</em><br>Evaluación del proceso logístico</h1>
  </div>
  <div class="header-meta">
    María Florencio · Lucía Canedo<br>
    Bloque II · Cadena de Suministros<br>
    Abril 2026
  </div>
</header>

<main id="app">
  <div style="color:var(--muted);font-family:'DM Mono',monospace;font-size:0.8rem;padding:2rem 0;">Cargando datos…</div>
</main>

<footer>
  <span>Datos: Ecommerce_KPIs.xlsx · 15 pedidos · Abril 2026</span>
  <span>OTIF North Star KPI</span>
</footer>

<script>
fetch('datos.json')
  .then(r => r.json())
  .then(d => renderDashboard(d))
  .catch(() => {
    document.getElementById('app').innerHTML = '<p style="color:var(--danger);font-family:DM Mono,monospace">Error cargando datos.json. Asegúrate de servir desde un servidor local.</p>';
  });

function pct(v) { return (v * 100).toFixed(1) + '%'; }
function colorClass(v, okThreshold, warnThreshold) {
  if (v >= okThreshold) return 'pct-ok';
  if (v >= warnThreshold) return 'pct-warn';
  return 'pct-bad';
}

function renderDashboard(d) {
  const app = document.getElementById('app');
  app.innerHTML = '';

  // ── KPI CARDS ──────────────────────────────────────────────────
  const kpiSection = document.createElement('section');
  kpiSection.style.marginBottom = '3rem';
  kpiSection.innerHTML = `<div class="section-title">01 · Cuadro de Mando KPI</div>`;

  const kpiDefs = [
    { label: 'OTIF',              val: pct(d.kpis.otif),                 cls: colorClass(d.kpis.otif, 0.8, 0.6),   sub: 'North Star KPI', highlight: true },
    { label: 'On-Time',           val: pct(d.kpis.on_time),              cls: colorClass(d.kpis.on_time, 0.85, 0.7), sub: 'A tiempo' },
    { label: 'In-Full',           val: pct(d.kpis.in_full),              cls: colorClass(d.kpis.in_full, 0.85, 0.7), sub: 'Completo' },
    { label: 'Perfect Order',     val: pct(d.kpis.perfect_order),        cls: colorClass(d.kpis.perfect_order, 0.7, 0.5), sub: 'Sin daño ni devolución' },
    { label: 'Fill Rate',         val: pct(d.kpis.fill_rate),            cls: colorClass(d.kpis.fill_rate, 0.95, 0.85), sub: 'Unidades servidas' },
    { label: 'Pedidos tardíos',   val: pct(d.kpis.late_orders_rate),     cls: d.kpis.late_orders_rate < 0.1 ? 'green' : d.kpis.late_orders_rate < 0.2 ? 'yellow' : 'red', sub: 'Late Orders Rate' },
    { label: 'Retraso medio',     val: d.kpis.avg_delay.toFixed(1) + 'd', cls: '',                                    sub: 'Solo pedidos tardíos' },
    { label: 'Lead Time medio',   val: d.kpis.avg_lead_time.toFixed(1) + 'd', cls: '',                                sub: 'Pedido → entrega' },
    { label: 'Return Rate',       val: pct(d.kpis.return_rate),          cls: d.kpis.return_rate < 0.05 ? 'green' : 'red', sub: 'Devoluciones' },
    { label: 'Damage Rate',       val: pct(d.kpis.damage_rate),          cls: 'green',                               sub: 'Pedidos con daño' },
    { label: 'Coste envío/pedido',val: '€' + d.kpis.shipping_cost_per_order.toFixed(2), cls: '',                    sub: 'Shipping Cost/Order' },
    { label: 'Coste log./ventas', val: pct(d.kpis.logistics_cost_pct_sales), cls: 'green',                          sub: 'Logistics Cost % Sales' },
  ];

  const grid = document.createElement('div');
  grid.className = 'kpi-grid';
  kpiDefs.forEach((k, i) => {
    const card = document.createElement('div');
    card.className = 'kpi-card fade-in' + (k.highlight ? ' highlight' : '');
    card.style.animationDelay = (i * 0.05) + 's';
    card.innerHTML = `
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value ${k.cls}">${k.val}</div>
      <div class="kpi-sub">${k.sub}</div>`;
    grid.appendChild(card);
  });
  kpiSection.appendChild(grid);
  app.appendChild(kpiSection);

  // ── DONUT CHARTS ───────────────────────────────────────────────
  const chartsSection = document.createElement('section');
  chartsSection.innerHTML = `<div class="section-title">02 · Visión de servicio</div>`;
  const chartsGrid = document.createElement('div');
  chartsGrid.className = 'charts-grid';

  const donuts = [
    { id: 'chartOTIF',    label: 'OTIF',         val: d.kpis.otif,          color: '#e8c547' },
    { id: 'chartOnTime',  label: 'On-Time',       val: d.kpis.on_time,       color: '#5b8cf7' },
    { id: 'chartInFull',  label: 'In-Full',       val: d.kpis.in_full,       color: '#5bf7c0' },
    { id: 'chartPerfect', label: 'Perfect Order', val: d.kpis.perfect_order, color: '#f76b5b' },
  ];

  donuts.forEach(ch => {
    const card = document.createElement('div');
    card.className = 'chart-card';
    card.innerHTML = `
      <div class="chart-title">${ch.label}</div>
      <div class="chart-sub">${pct(ch.val)} de los pedidos cumplen</div>
      <div class="chart-wrap">
        <canvas id="${ch.id}" width="200" height="200"></canvas>
        <div class="donut-center">
          <div class="donut-center-val">${pct(ch.val)}</div>
          <div class="donut-center-lbl">${ch.label}</div>
        </div>
      </div>`;
    chartsGrid.appendChild(card);
  });

  chartsSection.appendChild(chartsGrid);
  app.appendChild(chartsSection);

  // render donuts after DOM insertion
  setTimeout(() => {
    donuts.forEach(ch => {
      const ctx = document.getElementById(ch.id).getContext('2d');
      new Chart(ctx, {
        type: 'doughnut',
        data: {
          datasets: [{
            data: [ch.val, 1 - ch.val],
            backgroundColor: [ch.color, '#1e2230'],
            borderWidth: 0,
            hoverOffset: 4
          }]
        },
        options: {
          cutout: '72%',
          responsive: false,
          plugins: { legend: { display: false }, tooltip: { enabled: false } },
          animation: { animateRotate: true, duration: 900 }
        }
      });
    });
  }, 50);

  // ── PARETO ─────────────────────────────────────────────────────
  const paretoSection = document.createElement('section');
  paretoSection.innerHTML = `<div class="section-title">03 · Diagnóstico Pareto — ¿Por qué falla OTIF?</div>`;

  const paretoCard = document.createElement('div');
  paretoCard.className = 'pareto-card';

  const totalFallos = d.pareto.reduce((s, r) => s + r.fallos, 0);

  paretoCard.innerHTML = `
    <div class="chart-title">Fallos OTIF por Tipo de Incidencia</div>
    <div class="chart-sub">${totalFallos} pedidos con OTIF = 0 · ordenado de mayor a menor impacto</div>
    <div class="pareto-row header">
      <span>Incidencia</span><span>Impacto</span><span style="text-align:right">%</span><span style="text-align:right">% Acum.</span>
    </div>
    ${d.pareto.map((r, i) => `
      <div class="pareto-row">
        <span style="font-family:'DM Sans',sans-serif;font-weight:500">${r.tipo}</span>
        <div class="pareto-bar-track">
          <div class="pareto-bar-fill ${i < 2 ? 'top2' : ''}" style="width:${r.pct * 100}%"></div>
        </div>
        <span class="pareto-pct">${pct(r.pct)}</span>
        <span class="pareto-acum">${pct(r.pct_acum)}</span>
      </div>`).join('')}
    <div class="conclusion-box">
      Las 2 causas que más contribuyen al fallo OTIF son <strong>Retraso</strong> y <strong>RoturaStock</strong>
      (≈<strong>${pct(d.pareto[0].pct + d.pareto[1].pct)}</strong> acumulado). Al priorizar la resolución de estos problemas,
      se mitigaría casi tres cuartas partes de los fallos de servicio.
    </div>`;

  paretoSection.appendChild(paretoCard);
  app.appendChild(paretoSection);

  // ── SEGMENTACIÓN ───────────────────────────────────────────────
  const segSection = document.createElement('section');
  segSection.innerHTML = `<div class="section-title">04 · Segmentación por Transportista y Zona</div>`;
  const segGrid = document.createElement('div');
  segGrid.className = 'seg-grid';

  function buildSegTable(title, sub, rows, keyLabel) {
    const cols = ['OTIF','On-Time','In-Full','Perfecto'];
    const keys = ['otif','on_time','in_full','perfecto'];
    const card = document.createElement('div');
    card.className = 'seg-card';
    card.innerHTML = `
      <div class="chart-title">${title}</div>
      <div class="chart-sub">${sub}</div>
      <table>
        <thead><tr>
          <th>${keyLabel}</th>
          <th>Pedidos</th>
          ${cols.map(c => `<th>${c}</th>`).join('')}
        </tr></thead>
        <tbody>
          ${rows.map(r => `<tr>
            <td>${r[keyLabel.toLowerCase()] || r.transportista || r.zona}</td>
            <td>${r.pedidos}</td>
            ${keys.map(k => `<td class="${colorClass(r[k], 0.75, 0.6)}">${pct(r[k])}</td>`).join('')}
          </tr>`).join('')}
        </tbody>
      </table>`;
    return card;
  }

  // Transportista table
  const transCard = document.createElement('div');
  transCard.className = 'seg-card';
  transCard.innerHTML = `
    <div class="chart-title">Por Transportista</div>
    <div class="chart-sub">Comparativa de rendimiento A vs B</div>
    <table>
      <thead><tr>
        <th>Transportista</th><th>Pedidos</th><th>OTIF</th><th>On-Time</th><th>In-Full</th><th>Perfecto</th>
      </tr></thead>
      <tbody>
        ${d.segmentacion_transportista.map(r => `<tr>
          <td>${r.transportista}</td>
          <td>${r.pedidos}</td>
          <td class="${colorClass(r.otif, 0.75, 0.6)}">${pct(r.otif)}</td>
          <td class="${colorClass(r.on_time, 0.75, 0.6)}">${pct(r.on_time)}</td>
          <td class="${colorClass(r.in_full, 0.75, 0.6)}">${pct(r.in_full)}</td>
          <td class="${colorClass(r.perfecto, 0.75, 0.6)}">${pct(r.perfecto)}</td>
        </tr>`).join('')}
      </tbody>
    </table>
    <div class="conclusion-box" style="margin-top:1.2rem">
      El <strong>Transportista B</strong> muestra un OTIF significativamente inferior (42,9% vs 62,5%), con mayor concentración de incidencias por retraso y error de picking.
    </div>`;
  segGrid.appendChild(transCard);

  // Zona table
  const zonaCard = document.createElement('div');
  zonaCard.className = 'seg-card';
  zonaCard.innerHTML = `
    <div class="chart-title">Por Zona</div>
    <div class="chart-sub">Análisis geográfico del nivel de servicio</div>
    <table>
      <thead><tr>
        <th>Zona</th><th>Pedidos</th><th>OTIF</th><th>On-Time</th><th>In-Full</th><th>Perfecto</th>
      </tr></thead>
      <tbody>
        ${d.segmentacion_zona.map(r => `<tr>
          <td>${r.zona}</td>
          <td>${r.pedidos}</td>
          <td class="${colorClass(r.otif, 0.75, 0.6)}">${pct(r.otif)}</td>
          <td class="${colorClass(r.on_time, 0.75, 0.6)}">${pct(r.on_time)}</td>
          <td class="${colorClass(r.in_full, 0.75, 0.6)}">${pct(r.in_full)}</td>
          <td class="${colorClass(r.perfecto, 0.75, 0.6)}">${pct(r.perfecto)}</td>
        </tr>`).join('')}
      </tbody>
    </table>
    <div class="conclusion-box" style="margin-top:1.2rem">
      La zona <strong>Sur</strong> presenta el peor OTIF (40%), concentrando roturas de stock y retrasos. Norte y Oeste muestran mejor comportamiento relativo.
    </div>`;
  segGrid.appendChild(zonaCard);

  segSection.appendChild(segGrid);
  app.appendChild(segSection);

  // ── ACCIONES ───────────────────────────────────────────────────
  const accionSection = document.createElement('section');
  accionSection.innerHTML = `<div class="section-title">05 · Recomendación Accionable</div>`;
  const accionGrid = document.createElement('div');
  accionGrid.className = 'acciones-grid';

  d.acciones.forEach(a => {
    const card = document.createElement('div');
    card.className = 'accion-card';
    card.innerHTML = `
      <div class="accion-num">Acción ${a.num}</div>
      <div class="accion-title">${a.accion}</div>
      <div class="accion-row">
        <span class="accion-tag">Hipótesis</span>
        <span class="accion-val">${a.hipotesis}</span>
      </div>
      <div class="accion-row">
        <span class="accion-tag">KPI control</span>
        <span class="accion-val">${a.kpi}</span>
      </div>
      <div class="accion-row">
        <span class="accion-tag">Segmentación</span>
        <span class="accion-val">${a.segmentacion}</span>
      </div>
      <div class="accion-row">
        <span class="accion-tag">Meta</span>
        <span class="meta-badge">${a.meta}</span>
      </div>`;
    accionGrid.appendChild(card);
  });

  accionSection.appendChild(accionGrid);
  app.appendChild(accionSection);

  // ── NORTH STAR ─────────────────────────────────────────────────
  const ns = document.createElement('div');
  ns.className = 'northstar';
  ns.innerHTML = `
    <div class="northstar-icon">★</div>
    <div>
      <div class="northstar-label">KPI North Star · Conclusión</div>
      <div class="northstar-title">Usaríamos OTIF como métrica principal</div>
      <div class="northstar-text">
        OTIF captura simultáneamente las dos dimensiones críticas del servicio al cliente: tiempo y cantidad.
        Es directo y accionable para el equipo de operaciones. El Pedido Perfecto, aunque más completo,
        incorpora daños y devoluciones que dependen de más factores y son más difíciles de controlar a corto plazo.
        Con un OTIF actual del <strong style="color:var(--accent)">53,3%</strong>, el margen de mejora es claro y medible.
      </div>
    </div>`;
  app.appendChild(ns);
}
</script>
</body>
</html>
