<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Tower e-Commerce · KPI Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg:#0d0f14;--surface:#161920;--surface2:#1e2230;--border:#2a2f40;
    --accent:#e8c547;--accent2:#5b8cf7;--accent3:#f76b5b;--accent4:#5bf7c0;
    --text:#e8eaf0;--muted:#6b7194;--danger:#f76b5b;--ok:#5bf7c0;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;}
  header{position:relative;padding:3rem 4rem 2rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;gap:2rem;}
  .header-tag{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.2em;color:var(--accent);text-transform:uppercase;margin-bottom:.5rem;}
  header h1{font-family:'DM Serif Display',serif;font-size:clamp(1.8rem,4vw,3rem);font-weight:400;line-height:1.1;}
  header h1 em{font-style:italic;color:var(--accent);}
  .header-meta{text-align:right;font-size:.75rem;color:var(--muted);font-family:'DM Mono',monospace;line-height:1.8;}
  main{position:relative;z-index:1;padding:3rem 4rem;max-width:1400px;margin:0 auto;}
  .section-title{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.25em;color:var(--accent);text-transform:uppercase;margin-bottom:1.5rem;display:flex;align-items:center;gap:1rem;}
  .section-title::after{content:'';flex:1;height:1px;background:var(--border);}

  /* KPI grid: 4 donut cols + 4 regular cols, 2 rows of regular */
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr) repeat(4,1fr);grid-template-rows:auto auto;gap:1px;background:var(--border);border:1px solid var(--border);margin-bottom:3rem;}
  .kpi-card{background:var(--surface);padding:1.5rem;transition:background .2s;position:relative;overflow:hidden;}
  .kpi-card:hover{background:var(--surface2);}
  .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);opacity:0;transition:opacity .2s;}
  .kpi-card:hover::before{opacity:1;}

  /* Donut cards span 2 rows */
  .kpi-card.donut-card{grid-row:span 2;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem 1rem;background:#131620;}
  .kpi-card.donut-card::before{opacity:1;height:3px;}

  .kpi-label{font-size:.65rem;font-family:'DM Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.75rem;}
  .kpi-value{font-family:'DM Serif Display',serif;font-size:2rem;line-height:1;}
  .kpi-value.red{color:var(--danger);}.kpi-value.green{color:var(--ok);}.kpi-value.yellow{color:var(--accent);}
  .kpi-sub{font-size:.7rem;color:var(--muted);margin-top:.4rem;}

  .mini-donut-wrap{position:relative;width:120px;height:120px;display:flex;align-items:center;justify-content:center;margin:.5rem 0;}
  .mini-donut-wrap canvas{position:absolute;inset:0;}
  .mini-donut-center{position:relative;text-align:center;z-index:1;}
  .mini-donut-val{font-family:'DM Serif Display',serif;font-size:1.4rem;line-height:1;}
  .mini-donut-lbl{font-family:'DM Mono',monospace;font-size:.55rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:.2rem;}
  .donut-card-label{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;text-align:center;margin-bottom:.25rem;}
  .donut-card-sub{font-size:.65rem;color:var(--muted);text-align:center;margin-top:.35rem;}

  /* Pareto */
  .pareto-card{background:var(--surface);border:1px solid var(--border);padding:2rem;margin-bottom:3rem;}
  .pareto-row{display:grid;grid-template-columns:130px 1fr 60px 70px;align-items:center;gap:1rem;padding:.75rem 0;border-bottom:1px solid var(--border);font-size:.82rem;}
  .pareto-row:last-child{border-bottom:none;}
  .pareto-row.header{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;padding-bottom:1rem;}
  .pareto-bar-track{background:var(--surface2);height:6px;border-radius:3px;overflow:hidden;}
  .pareto-bar-fill{height:100%;border-radius:3px;background:var(--accent);}
  .pareto-bar-fill.top2{background:var(--danger);}
  .pareto-pct{font-family:'DM Mono',monospace;font-size:.78rem;color:var(--text);text-align:right;}
  .pareto-acum{font-family:'DM Mono',monospace;font-size:.78rem;color:var(--muted);text-align:right;}
  .conclusion-box{margin-top:1.5rem;padding:1rem 1.5rem;border-left:3px solid var(--accent);background:#1a1c10;font-size:.82rem;line-height:1.6;}
  .conclusion-box strong{color:var(--accent);}

  /* Seg */
  .seg-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem;margin-bottom:3rem;}
  .seg-card{background:var(--surface);border:1px solid var(--border);padding:2rem;}
  .chart-title{font-family:'DM Serif Display',serif;font-size:1.1rem;margin-bottom:.4rem;}
  .chart-sub{font-size:.72rem;color:var(--muted);margin-bottom:1.5rem;font-family:'DM Mono',monospace;}
  table{width:100%;border-collapse:collapse;font-size:.78rem;}
  thead tr{border-bottom:1px solid var(--border);}
  th{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;padding:0 .5rem .75rem;text-align:right;font-weight:400;}
  th:first-child{text-align:left;}
  td{padding:.65rem .5rem;text-align:right;border-bottom:1px solid #1e2230;font-family:'DM Mono',monospace;}
  td:first-child{text-align:left;font-family:'DM Sans',sans-serif;font-weight:500;}
  .pct-ok{color:var(--ok);}.pct-warn{color:var(--accent);}.pct-bad{color:var(--danger);}

  /* Acciones */
  .acciones-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem;margin-bottom:3rem;}
  .accion-card{background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--accent2);padding:2rem;}
  .accion-card:nth-child(2){border-top-color:var(--accent4);}
  .accion-num{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin-bottom:.5rem;}
  .accion-title{font-family:'DM Serif Display',serif;font-size:1rem;margin-bottom:1.25rem;line-height:1.4;}
  .accion-row{display:flex;gap:.75rem;margin-bottom:.6rem;font-size:.78rem;align-items:flex-start;}
  .accion-tag{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--accent2);text-transform:uppercase;letter-spacing:.1em;min-width:80px;padding-top:.1rem;}
  .accion-card:nth-child(2) .accion-tag{color:var(--accent4);}
  .accion-val{color:var(--muted);line-height:1.5;}
  .meta-badge{display:inline-block;padding:.2rem .6rem;font-family:'DM Mono',monospace;font-size:.65rem;border-radius:2px;background:#1e2230;color:var(--ok);border:1px solid var(--ok);margin-top:.25rem;}

  /* North star */
  .northstar{background:linear-gradient(135deg,#1a1c10 0%,#131620 100%);border:1px solid var(--accent);padding:2.5rem;margin-bottom:3rem;display:flex;align-items:center;gap:3rem;}
  .northstar-icon{font-size:3rem;line-height:1;flex-shrink:0;}
  .northstar-label{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--accent);text-transform:uppercase;letter-spacing:.2em;margin-bottom:.5rem;}
  .northstar-title{font-family:'DM Serif Display',serif;font-size:1.6rem;margin-bottom:.75rem;}
  .northstar-text{font-size:.82rem;color:var(--muted);line-height:1.7;max-width:600px;}

  footer{border-top:1px solid var(--border);padding:1.5rem 4rem;display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);}
  .fade-in{opacity:0;transform:translateY(16px);animation:fadeIn .5s forwards;}
  @keyframes fadeIn{to{opacity:1;transform:translateY(0);}}
  @media(max-width:900px){
    header,main,footer{padding-left:1.5rem;padding-right:1.5rem;}
    .kpi-grid{grid-template-columns:repeat(2,1fr);}
    .kpi-card.donut-card{grid-row:span 1;}
    .seg-grid,.acciones-grid{grid-template-columns:1fr;}
    .northstar{flex-direction:column;gap:1rem;}
  }
</style>
</head>
<body>
<header class="fade-in">
  <div>
    <div class="header-tag">Máster en Economía, Finanzas y Computación · Inteligencia de Negocios II</div>
    <h1>Control Tower <em>e-Commerce</em><br>Evaluación del proceso logístico</h1>
  </div>
  <div class="header-meta">María Florencio · Lucía Canedo<br>Bloque II · Cadena de Suministros<br>Abril 2026</div>
</header>
<main id="app"><div style="color:var(--muted);font-family:'DM Mono',monospace;font-size:.8rem;padding:2rem 0;">Cargando datos…</div></main>
<footer>
  <span>Datos: Ecommerce_KPIs.xlsx · 15 pedidos · Abril 2026</span>
  <span>OTIF North Star KPI</span>
</footer>
<script>
fetch('datos.json').then(r=>r.json()).then(renderDashboard).catch(()=>{
  document.getElementById('app').innerHTML='<p style="color:var(--danger);font-family:DM Mono,monospace">Error cargando datos.json.</p>';
});

function pct(v){return(v*100).toFixed(1)+'%';}
function cc(v,ok,warn){return v>=ok?'pct-ok':v>=warn?'pct-warn':'pct-bad';}

function renderDashboard(d){
  const app=document.getElementById('app');
  app.innerHTML='';

  // 01 KPI
  const kpiSec=document.createElement('section');
  kpiSec.style.marginBottom='3rem';
  kpiSec.innerHTML='<div class="section-title">01 · Cuadro de Mando KPI</div>';

  const donutDefs=[
    {id:'dOTIF',   label:'OTIF',         val:d.kpis.otif,          color:'#e8c547',sub:'North Star KPI'},
    {id:'dOnTime', label:'On-Time',       val:d.kpis.on_time,       color:'#5b8cf7',sub:'A tiempo'},
    {id:'dInFull', label:'In-Full',       val:d.kpis.in_full,       color:'#5bf7c0',sub:'Completo'},
    {id:'dPerfect',label:'Perfect Order', val:d.kpis.perfect_order, color:'#f76b5b',sub:'Sin daño ni dev.'},
  ];
  const regularDefs=[
    {label:'Fill Rate',         val:pct(d.kpis.fill_rate),                       cls:cc(d.kpis.fill_rate,.95,.85),                                                       sub:'Unidades servidas'},
    {label:'Pedidos tardíos',   val:pct(d.kpis.late_orders_rate),                 cls:d.kpis.late_orders_rate<.1?'green':d.kpis.late_orders_rate<.2?'yellow':'red',       sub:'Late Orders Rate'},
    {label:'Retraso medio',     val:d.kpis.avg_delay.toFixed(1)+'d',              cls:'',                                                                                  sub:'Solo tardíos'},
    {label:'Lead Time medio',   val:d.kpis.avg_lead_time.toFixed(1)+'d',          cls:'',                                                                                  sub:'Pedido → entrega'},
    {label:'Return Rate',       val:pct(d.kpis.return_rate),                      cls:d.kpis.return_rate<.05?'green':'red',                                                sub:'Devoluciones'},
    {label:'Damage Rate',       val:pct(d.kpis.damage_rate),                      cls:'green',                                                                             sub:'Pedidos con daño'},
    {label:'Coste envío/pedido',val:'€'+d.kpis.shipping_cost_per_order.toFixed(2),cls:'',                                                                                  sub:'Shipping Cost/Order'},
    {label:'Coste log./ventas', val:pct(d.kpis.logistics_cost_pct_sales),         cls:'green',                                                                             sub:'Logistics Cost % Sales'},
  ];

  const grid=document.createElement('div');
  grid.className='kpi-grid';

  donutDefs.forEach((k,i)=>{
    const c=document.createElement('div');
    c.className='kpi-card donut-card fade-in';
    c.style.animationDelay=(i*.07)+'s';
    c.innerHTML=`
      <div class="donut-card-label">${k.label}</div>
      <div class="mini-donut-wrap">
        <canvas id="${k.id}" width="120" height="120"></canvas>
        <div class="mini-donut-center">
          <div class="mini-donut-val" style="color:${k.color}">${pct(k.val)}</div>
          <div class="mini-donut-lbl">${k.label}</div>
        </div>
      </div>
      <div class="donut-card-sub">${k.sub}</div>`;
    grid.appendChild(c);
  });

  regularDefs.forEach((k,i)=>{
    const c=document.createElement('div');
    c.className='kpi-card fade-in';
    c.style.animationDelay=((i+4)*.05)+'s';
    c.innerHTML=`<div class="kpi-label">${k.label}</div><div class="kpi-value ${k.cls}">${k.val}</div><div class="kpi-sub">${k.sub}</div>`;
    grid.appendChild(c);
  });

  kpiSec.appendChild(grid);
  app.appendChild(kpiSec);

  setTimeout(()=>{
    donutDefs.forEach(k=>{
      new Chart(document.getElementById(k.id).getContext('2d'),{
        type:'doughnut',
        data:{datasets:[{data:[k.val,1-k.val],backgroundColor:[k.color,'#1e2230'],borderWidth:0}]},
        options:{cutout:'68%',responsive:false,plugins:{legend:{display:false},tooltip:{enabled:false}},animation:{animateRotate:true,duration:900}}
      });
    });
  },50);

  // 02 PARETO
  const paretoSec=document.createElement('section');
  paretoSec.innerHTML='<div class="section-title">02 · Diagnóstico Pareto — ¿Por qué falla OTIF?</div>';
  const totalFallos=d.pareto.reduce((s,r)=>s+r.fallos,0);
  const pc=document.createElement('div');
  pc.className='pareto-card';
  pc.innerHTML=`
    <div class="chart-title">Fallos OTIF por Tipo de Incidencia</div>
    <div class="chart-sub">${totalFallos} pedidos con OTIF = 0 · ordenado de mayor a menor impacto</div>
    <div class="pareto-row header"><span>Incidencia</span><span>Impacto</span><span style="text-align:right">%</span><span style="text-align:right">% Acum.</span></div>
    ${d.pareto.map((r,i)=>`
      <div class="pareto-row">
        <span style="font-family:'DM Sans',sans-serif;font-weight:500">${r.tipo}</span>
        <div class="pareto-bar-track"><div class="pareto-bar-fill ${i<2?'top2':''}" style="width:${r.pct*100}%"></div></div>
        <span class="pareto-pct">${pct(r.pct)}</span>
        <span class="pareto-acum">${pct(r.pct_acum)}</span>
      </div>`).join('')}
    <div class="conclusion-box">
      Las 2 causas que más contribuyen al fallo OTIF son <strong>Retraso</strong> y <strong>RoturaStock</strong>
      (≈<strong>${pct(d.pareto[0].pct+d.pareto[1].pct)}</strong> acumulado). Al priorizar su resolución
      se mitigaría casi tres cuartas partes de los fallos de servicio.
    </div>`;
  paretoSec.appendChild(pc);
  app.appendChild(paretoSec);

  // 03 SEGMENTACIÓN
  const segSec=document.createElement('section');
  segSec.innerHTML='<div class="section-title">03 · Segmentación por Transportista y Zona</div>';
  const sg=document.createElement('div');
  sg.className='seg-grid';

  const tc=document.createElement('div');
  tc.className='seg-card';
  tc.innerHTML=`
    <div class="chart-title">Por Transportista</div>
    <div class="chart-sub">Comparativa de rendimiento A vs B</div>
    <table><thead><tr><th>Transportista</th><th>Pedidos</th><th>OTIF</th><th>On-Time</th><th>In-Full</th><th>Perfecto</th></tr></thead>
    <tbody>${d.segmentacion_transportista.map(r=>`<tr><td>${r.transportista}</td><td>${r.pedidos}</td>
      <td class="${cc(r.otif,.75,.6)}">${pct(r.otif)}</td><td class="${cc(r.on_time,.75,.6)}">${pct(r.on_time)}</td>
      <td class="${cc(r.in_full,.75,.6)}">${pct(r.in_full)}</td><td class="${cc(r.perfecto,.75,.6)}">${pct(r.perfecto)}</td></tr>`).join('')}
    </tbody></table>
    <div class="conclusion-box" style="margin-top:1.2rem">El <strong>Transportista B</strong> muestra un OTIF significativamente inferior (42,9% vs 62,5%), con mayor concentración de incidencias por retraso y error de picking.</div>`;
  sg.appendChild(tc);

  const zc=document.createElement('div');
  zc.className='seg-card';
  zc.innerHTML=`
    <div class="chart-title">Por Zona</div>
    <div class="chart-sub">Análisis geográfico del nivel de servicio</div>
    <table><thead><tr><th>Zona</th><th>Pedidos</th><th>OTIF</th><th>On-Time</th><th>In-Full</th><th>Perfecto</th></tr></thead>
    <tbody>${d.segmentacion_zona.map(r=>`<tr><td>${r.zona}</td><td>${r.pedidos}</td>
      <td class="${cc(r.otif,.75,.6)}">${pct(r.otif)}</td><td class="${cc(r.on_time,.75,.6)}">${pct(r.on_time)}</td>
      <td class="${cc(r.in_full,.75,.6)}">${pct(r.in_full)}</td><td class="${cc(r.perfecto,.75,.6)}">${pct(r.perfecto)}</td></tr>`).join('')}
    </tbody></table>
    <div class="conclusion-box" style="margin-top:1.2rem">La zona <strong>Sur</strong> presenta el peor OTIF (40%), concentrando roturas de stock y retrasos. Norte y Oeste muestran mejor comportamiento relativo.</div>`;
  sg.appendChild(zc);

  segSec.appendChild(sg);
  app.appendChild(segSec);

  // 04 ACCIONES
  const acSec=document.createElement('section');
  acSec.innerHTML='<div class="section-title">04 · Recomendación Accionable</div>';
  const ag=document.createElement('div');
  ag.className='acciones-grid';
  d.acciones.forEach(a=>{
    const c=document.createElement('div');
    c.className='accion-card';
    c.innerHTML=`
      <div class="accion-num">Acción ${a.num}</div>
      <div class="accion-title">${a.accion}</div>
      <div class="accion-row"><span class="accion-tag">Hipótesis</span><span class="accion-val">${a.hipotesis}</span></div>
      <div class="accion-row"><span class="accion-tag">KPI control</span><span class="accion-val">${a.kpi}</span></div>
      <div class="accion-row"><span class="accion-tag">Segmentación</span><span class="accion-val">${a.segmentacion}</span></div>
      <div class="accion-row"><span class="accion-tag">Meta</span><span class="meta-badge">${a.meta}</span></div>`;
    ag.appendChild(c);
  });
  acSec.appendChild(ag);
  app.appendChild(acSec);

  // 05 NORTH STAR
  const ns=document.createElement('div');
  ns.className='northstar';
  ns.innerHTML=`
    <div class="northstar-icon">★</div>
    <div>
      <div class="northstar-label">KPI North Star · Conclusión</div>
      <div class="northstar-title">Usaríamos OTIF como métrica principal</div>
      <div class="northstar-text">OTIF captura simultáneamente las dos dimensiones críticas del servicio al cliente: tiempo y cantidad.
      Es directo y accionable para el equipo de operaciones. El Pedido Perfecto, aunque más completo,
      incorpora daños y devoluciones que dependen de más factores y son más difíciles de controlar a corto plazo.
      Con un OTIF actual del <strong style="color:var(--accent)">53,3%</strong>, el margen de mejora es claro y medible.</div>
    </div>`;
  app.appendChild(ns);
}
</script>
</body>
</html>
